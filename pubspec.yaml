name: lcov_parser
description: A Dart package that parses LCOV coverage files into structured records, providing easy access to line, branch, and function coverage data.
version: 0.1.3
homepage: https://github.com/eliasreis54/lcov_parser

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.0
  path: ^1.9.0
  collection: ^1.18.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0

